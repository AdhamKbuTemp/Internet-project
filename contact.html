<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karabuk Pets</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <h1>Pet Adoption Center</h1>
      <nav>
        <ul>
          <li>
            <a href="index.html">Home</a>
          </li>
          <li>
            <a href="pets.html">Adopt a Pet</a>
          </li>
          <li>
            <a href="about.html">About Us</a>
          </li>
          <li>
            <a href="contact.html">Contact Us</a>
          </li>
        </ul>
      </nav>
    </header>
    <img src="./Images/adoptMe.jpg" class="contact-img" />
    <form
      class="contact-form"
      action="https://formspree.io/f/mvzlrdne
"
      method="POST"
    >
      <h2>Contact Us</h2>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />
      <label for="phone"> Phone Number:</label>
      <input type="tel" id="phone" name="phone" />

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <label for="i want to">I Want To:</label>
      <select id="i want to" name="i want to">
        <option value="volunteer">Volunteer</option>
        <option value="adopt">Adopt</option>
      </select>

      <button type="submit" class="btn">Submit</button>
    </form>
    <footer>
      <p>&copy; 2024 Karabuk Pet Adoption Center. All rights reserved.</p>
      <div class="social-links">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
      </div>
    </footer>
  </body>
</html>
